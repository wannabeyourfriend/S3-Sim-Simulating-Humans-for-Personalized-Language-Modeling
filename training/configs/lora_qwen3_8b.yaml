# Reference LoRA-SFT configuration for S³-Sim conversational personalization.
#
# This config is the recipe used in the paper. It is a literal-form
# specification: the released code does not parse it directly; rather, it is
# the canonical record of every hyperparameter the trainer was invoked with.
# The training step itself is run via TRL's `SFTTrainer` (or any equivalent
# multi-turn SFT runner) on the JSONL produced by `training/assemble_sft.py`.
#
# Backbone:        Qwen3-8B (replace `model.name_or_path` for Llama-3 etc.)
# Adapter:         LoRA, rank 16, alpha 32, dropout 0.05
# Optimizer:       paged AdamW 8-bit, cosine schedule, warmup 3 %
# Effective batch: 32  (per_device 2 × grad_accum 16 × 1 GPU; scale by world)
# Sequence:        4 096 tokens, packing on
# Compute target:  4 × A100 80 GB (≈ 4 h for ~ 35 k samples × 3 epochs)

model:
  name_or_path: Qwen/Qwen3-8B
  dtype: bfloat16
  attn_implementation: flash_attention_2
  trust_remote_code: true

dataset:
  train_file: data/sft/train.jsonl    # output of training/assemble_sft.py
  eval_file: null                     # held-out eval is run via run_eval_qa.py
  template: chatml
  pack_sequences: true
  max_seq_length: 4096

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

training:
  output_dir: output/sft/qwen3_8b_s3sim
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  optim: paged_adamw_8bit
  bf16: true
  tf32: true
  gradient_checkpointing: true
  logging_steps: 10
  save_strategy: epoch
  save_total_limit: 2
  report_to: [tensorboard]
  seed: 42

# Reproducing the paper:
#
#   1. Generate data
#        python run_rollout.py --ablation full --concurrency 80
#        python run_qc.py    --conversations-dir output/conversations/full
#        python run_qa_construction.py \
#               --conversations-dir output/conversations/full \
#               --qc-results        output/qc/v1/qc_results.jsonl \
#               --output-dir        output/qa/v1
#
#   2. Assemble SFT
#        python -m training.assemble_sft \
#               --conv-dirs output/conversations/full \
#               --qa-files  output/qa/v1/personamem_mcq.jsonl \
#                           output/qa/v1/prefeval_gen.jsonl \
#               --output    data/sft/train.jsonl
#
#   3. Train (TRL SFTTrainer)
#        accelerate launch -m trl sft \
#               --model_name_or_path Qwen/Qwen3-8B \
#               --dataset_name      data/sft/train.jsonl \
#               --use_peft --lora_r 16 --lora_alpha 32 \
#               --per_device_train_batch_size 2 --gradient_accumulation_steps 16 \
#               --learning_rate 2e-4 --num_train_epochs 3 \
#               --max_seq_length 4096 --packing True --bf16 \
#               --output_dir output/sft/qwen3_8b_s3sim
#
#   4. Eval
#        python run_eval_qa.py --qa-dir output/qa/v1 \
#               --models output/sft/qwen3_8b_s3sim --concurrency 40
#        python -m multibench --model output/sft/qwen3_8b_s3sim   # p13n-eval-harness
