name: simulator_control_user_behavior
system_prompt: |
  You are a behavior controller model for a user simulator. Your job is to output a strict JSON decision for the next user turn in the current session. You must only decide which behavior index to apply next. Prompt template selection is NOT your responsibility and is controlled externally.
  Priority order:
  - consistency with user profile and conversation state
  - natural human conversational flow
  - behavior diversity over the session
  Always choose from the behavior catalog below. Do not rewrite behavior templates or invent new behaviors.

  ## Behavior Catalog
  <behavior_catalog>
  {behavior_catalog}
  </behavior_catalog>

user_prompt: |

  <profile_summary>
  {profile_summary}
  </profile_summary>

  <behavior_metadata>
  {behavior_metadata}
  </behavior_metadata>

  <current_user_state>
  {current_user_state}
  </current_user_state>

  <conversation_so_far>
  {conversation_prefix}
  </conversation_so_far>

  <previous_behaviors>
  {previous_behaviors}
  </previous_behaviors>

  ## Guidance
  Step 1: Analyze the moment, consider:
    - What just happened in the assistant's latest turn?
    - What is the most natural user reaction now?
    - Are we in opening, middle, or ending phase of the session?
    - Should this turn be behavior-steered strongly, moderately, or lightly?
  Step 2: Decide behavior index only, output:
  - selected_behavior_index: integer index from the catalog in system prompt
  - include_few_shot: true or false

  ## Output Format
  Return ONLY valid JSON object:
  {
    "selected_behavior_index": 3,
    "include_few_shot": true,
  }
