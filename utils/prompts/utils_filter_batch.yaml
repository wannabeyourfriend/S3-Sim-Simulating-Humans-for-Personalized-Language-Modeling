name: utils_filter_batch_of_prompts
prompt: |
  You are evaluating whether prompts suit a specific persona, then selecting a diverse, high-value subset.

  <persona>
  {persona_summary}
  </persona>

  <prompts>
  {prompts_list}
  </prompts>

  Evaluate each prompt on three dimensions
    1. relevance (primary):   Would this person plausibly ask about this topic given their expertise, role, interests, and life circumstances?
    2. utility (secondary):   Would the answer be genuinely valuable for their specific situation?
    3. naturalness (tertiary):Does the question type match how they interact with an AI assistant?
  From qualifying prompts:
    1. Group by topic cluster (e.g. "career", "health", "finance", "parenting", "math", "coding")
    2. Within each cluster, keep only the highest-scoring prompt
    3. Rank clusters by their top score, select until you have 10–20 prompts total
      - If fewer than 10 qualify after deduplication, lower threshold to 5.5 and retry
      - If more than 20 qualify, take the top 20 by score

  <output_format>
  JSON only.
  {
    "selected": [
      {
        "index": <original index, integer>,
        "cluster": "<topic cluster label>",
        "score": <weighted 0-10>,
      }
    ],
    "total_qualified": <count before deduplication>,
    "discarded_count": <count not selected>
  }
  </output_format>